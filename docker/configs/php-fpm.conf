[www]
; Configuração de processos estática para menor latência
pm = static
pm.max_children = 40    ; Total de workers. Ajuste: RAM livre / 50MB
pm.max_requests = 1000  ; Reinicia worker após X requisições (previne leaks)

; Logging e monitoramento
access.log = /proc/self/fd/2
catch_workers_output = yes
slowlog = /var/log/php-fpm.slow.log
request_slowlog_timeout = 5s